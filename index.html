<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Clock Animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f4ecd8;
            font-family: system-ui, sans-serif;
        }

        .clock {
            --size: 300px;
            width: var(--size);
            height: var(--size);
            border-radius: 50%;
            border: 4px solid #333;
            background: antiquewhite;
            position: relative;
        }

        .numbers div {
            position: absolute;
            font-weight: bold;
            font-size: 22px;
        }
        .numbers div:nth-child(1) { top: 10px;    left: 50%;  transform: translateX(-50%); }
        .numbers div:nth-child(2) { right: 14px;  top: 50%;   transform: translateY(-50%); }
        .numbers div:nth-child(3) { bottom: 10px; left: 50%;  transform: translateX(-50%); }
        .numbers div:nth-child(4) { left: 14px;   top: 50%;   transform: translateY(-50%); }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: 50% 100%;
            border-radius: 4px;
            background: #222;
        }

        .hours {
            width: 8px;
            height: 28%;
            animation: spin 43200s linear infinite;
        }
        .minutes {
            width: 5px;
            height: 40%;
            animation: spin 3600s linear infinite;
        }
        .seconds {
            width: 2px;
            height: 45%;
            background: crimson;
            animation: spin 60s linear infinite;
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            background: crimson;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            from { transform: translateX(-50%) rotate(0deg); }
            to   { transform: translateX(-50%) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="clock">
        <div class="numbers">
            <div>12</div>
            <div>3</div>
            <div>6</div>
            <div>9</div>
        </div>

        <div class="hand hours"></div>
        <div class="hand minutes"></div>
        <div class="hand seconds"></div>
        <div class="center"></div>
    </div>

</body>
</html>
